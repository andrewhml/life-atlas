# Atlas Device Inventory
#
# Single machine-readable rollup of every device, surface, and backup flow in
# the Atlas ecosystem. Narrative detail for each device lives in the matching
# device-schemas/*.md file; this file is the cross-cutting index.
#
# Purpose:
#   1. Give Claude a compact, structured snapshot so future planning sessions
#      start with full context instead of two hours of Q&A (see
#      docs/ideas/atlas-dashboard.md for why this matters).
#   2. Serve as the data source for a simple GUI/visualization (see Plan 0006
#      once written — "Atlas Map" thin MVP).
#
# Conventions:
#   - Sizes in GB/TB as decimal (1 TB = 1000 GB), matching vendor capacity
#     labels. Use `_bytes` suffix for byte-exact values.
#   - `null` or `tbd` = unknown, not yet measured. Never guess — a blank is
#     honest, a wrong number propagates.
#   - `verified` dates are when a human (or tool) last confirmed the value.
#     Treat anything older than the value's volatility class as stale.
#   - Cross-references to plans/issues are bare strings (e.g. "plan 0002
#     phase 4", "issue #11") — not links — so git diffs stay clean.
#
# Update cadence: whenever a capacity, service, or backup flow changes, or at
# minimum at /session-end when drift is caught.

