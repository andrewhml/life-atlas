# ---------------------------------------------------------------------------
# REPOS — git repos that hold cross-device personal infrastructure
# (life-atlas itself is implicit; entries here are sibling repos that
# life-atlas documents and orchestrates.)
# ---------------------------------------------------------------------------
repos:

  - id: claude-harness
    display_name: Claude Code harness
    url: git@github.com:andrewhml/claude-harness.git
    visibility: private
    role: cross_device_claude_config
    transport: git
    working_tree_paths:
      - device: macbook-personal
        path: ~/.claude
        mechanism: git_clone
      - device: macbook-m5
        path: ~/.claude
        mechanism: git_clone  # established in plan 0007 Phase 5
    contents:
      - CLAUDE.md (user global instructions)
      - statusline.sh
      - mcp.json + mcp-wrappers/
      - commands/, skills/
      - plugins/installed_plugins.lock.json  # also carries $marketplaces_required block for portable marketplace re-add
      - settings.json
      - secrets-manifest.txt (Keychain item names, no values)
    excluded_per_machine:
      - sessions/, history.jsonl, projects/, teams/  # session/conversation state (teams/ reclassified during plan-0007 Phase 2a execution)
      - cache/, paste-cache/, shell-snapshots/, session-env/, telemetry/, statsig/, ide/
      - settings.local.json  # Anthropic's intended per-machine override seam
      - plugins/cache/, plugins/install-counts-cache.json, plugins/data/, plugins/marketplaces/
      - plugins/installed_plugins.json  # contains AM2-local installPath, not portable
      - plugins/known_marketplaces.json  # installLocation + lastUpdated churn (Phase 2k reclassification)
      - plugins/blocklist.json  # fetchedAt churns; carried only test data (Phase 2k reclassification)
      - ~/.claude.json (sibling file, not inside ~/.claude/ — OAuth + per-project trust)
    secret_storage: macos_keychain  # naming convention: claude-mcp-<server>-<credential>
    runbook: environment/claude-setup.md
    seed_script: (none — git init is one-time, documented inline in plan 0007 Phase 2)
    per_machine_setup_script: environment/setup-claude-secrets.sh
    related_plans:
      - plan 0007 (this plan — onboarding + ongoing sync model)
      - plan 0003 (sister architecture for shell prompt; uses snapshot-not-symlink for the same reasons)
    related_issues:
      - "#43 (Claude config migration — closes with plan 0007 Milestone A)"
      - "#41 (NOTION_TOKEN in legacy ~/Atlas/config/ai/.mcp.json — folded into plan 0007 Phase 2a)"

